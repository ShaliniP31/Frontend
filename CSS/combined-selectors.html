<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            background-color: aqua;
        }

        div h1 {
            background-color: blue;
        }

        /* div > h1 {
            background-color: red;
        } */

        /* h1 + h2 {
            background-color: blueviolet;
        } */

        h1 ~ h2 {
            background-color: orange;
        }
    </style>
</head>

<body>
    <div>
        <h1>This is h1 tag in div.</h1>
        <section>
            <h1>This is h1 in section.</h1>
            <h2>This is h2 in section.</h2>
            <h2>This is second h2 in section.</h2>
        </section>
         <h2>This is h2 in div.</h2>
    </div>
</body>

</html>
