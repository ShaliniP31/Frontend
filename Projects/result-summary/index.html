<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Results summary component</title>
</head>

<body>
  <div id="card">
    <div id="result">
      <p class="gray">Your Result</p>
      <div id="circle">
        <p id="res">76</p>
        <p class="gray small-text">of 100</p>
      </div>
      <p>Great</p>
      <p id="text" class="gray small-text">You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div id="summary">
      <p>Summary</p>
      <div id="reaction" class="row">
        <img src="./images/icon-reaction.svg"/>
        <p>Reaction</p>
        <p>80 </p>
        <p>/ 100</p>
      </div>
      <div id="memory" class="row">
        <img src="./images/icon-memory.svg">
        <p>Memory</p>
        <p>92 </p>
        <p>/ 100</p>
      </div>
      <div id="verbal" class="row">
        <img src="./images/icon-verbal.svg">
        <p>Verbal</p>
        <p>61 </p>
        <p>/ 100</p>
      </div>
      <div id="visual" class="row">
        <img src="./images/icon-visual.svg">
        <p>Visual</p>
        <p>72 </p>
        <p>/ 100</p>
      </div>
      <button type="submit" id="btn" class="row">Continue</button>
    </div>
  </div>
</body>

</html>
